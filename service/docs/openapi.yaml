openapi: "3.0.0"
info:
  title: Artes Reports API
  version: 1.0.0
servers: []
paths:
  /api/:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy

  /api/logo-url:
    get:
      summary: Get logo URL
      tags: [Logo]
      responses:
        "200":
          description: Logo URL returned successfully

  /api/logo:
    get:
      summary: Get logo image
      tags: [Logo]
      responses:
        "200":
          description: Logo image file
        "404":
          description: Logo not found
    post:
      summary: Upload a logo
      tags: [Logo]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Logo uploaded successfully

  /api/reports:
    get:
      summary: Get all reports
      tags: [Reports]
      responses:
        "200":
          description: List of all reports
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    type:
                      type: string
                    project:
                      type: string
                    minio_url:
                      type: string
                    report_url:
                      type: string
    delete:
      tags: [Reports]
      summary: Delete all reports
      parameters:
        - in: query
          name: project
          schema:
            type: string
          description: Filter by project name (partial match)
        - in: query
          name: name
          schema:
            type: string
          description: Filter by report name (partial match)
        - in: query
          name: type
          schema:
            type: string
          description: Filter by report type (exact match)
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Filter by exact upload date (YYYY-MM-DD)
        - in: query
          name: fromDate
          schema:
            type: string
            format: date-time
          description: Filter reports uploaded from this date
        - in: query
          name: toDate
          schema:
            type: string
            format: date-time
          description: Filter reports uploaded up to this date
      responses:
        "200":
          description: All matching reports deleted
        "404":
          description: No reports found to delete

  /api/preview/{id}:
    get:
      summary: Preview report by ID
      tags: [Reports]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Report UUID
      responses:
        "302":
          description: Redirects to the report index.html
        "404":
          description: Report not found

  /api/types:
    get:
      summary: Get all report types
      tags: [Reports]
      responses:
        "200":
          description: List of report types
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
   
  /api/projects:
    get:
      summary: Get all projects
      tags: [Reports]
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/browsers:
    get:
      tags: [Reports]
      summary: Get browsers
      responses:
        "200":
          description: List of browsers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/os:
    get:
      tags: [Reports]
      summary: Get OS
      responses:
        "200":
          description: List of OS
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/executors:
    get:
      tags: [Reports]
      summary: Get executors
      responses:
        "200":
          description: List of executors
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/environments:
    get:
      tags: [Reports]
      summary: Get environments
      responses:
        "200":
          description: List of environments
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  
  /api/report/{id}:
    patch:
      summary: Change report name
      tags: [Reports]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Report name updated
        "404":
          description: Report not found

    delete:
      tags: [Reports]
      summary: Delete report by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Report deleted successfully"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Report not found"